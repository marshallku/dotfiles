# Mouse support (scroll, select pane, resize)
set -g mouse on

# Status bar
set -g status on
set -g status-position bottom
set -g status-style 'bg=#1e1e2e,fg=#cdd6f4'

# Left side: session name
set -g status-left '#[bg=#cba6f7,fg=#1e1e2e,bold] #S #[default] '
set -g status-left-length 20

# Right side: save flash (󰆓 saved, ~8s after any resurrect save), agent status
# (⚑ sessions wanting attention, ● busy/live agents), zoom flag, prefix
# indicator, time, host. Styles inside #{?,} conditionals use separate #[..]
# blocks because a comma would terminate the conditional.
set -g status-interval 5
set -g status-right-length 100
set -g status-right '#(~/.claude/scripts/tmux-save-status.sh)#(~/.claude/scripts/tmux-agent-status.sh)#{?window_zoomed_flag,#[bg=#f9e2af]#[fg=#1e1e2e]#[bold] Z #[default] ,}#{?client_prefix,#[bg=#cba6f7]#[fg=#1e1e2e]#[bold] ^B #[default] ,}#[bg=#313244,fg=#bac2de] %H:%M #[default] #[bg=#89b4fa,fg=#1e1e2e,bold]  #h '

# Window tabs
set -g window-status-format '#[fg=#6c7086] #I #W '
set -g window-status-current-format '#[bg=#cba6f7,fg=#1e1e2e,bold] #I #W '
set -g window-status-separator ''
set -g status-justify left

# Pane borders
set -g pane-border-style 'fg=#313244'
set -g pane-active-border-style 'fg=#cba6f7'

# Switch windows with Alt+number (hyprland-style)
bind -n M-1 select-window -t 0
bind -n M-2 select-window -t 1
bind -n M-3 select-window -t 2
bind -n M-4 select-window -t 3
bind -n M-5 select-window -t 4
bind -n M-6 select-window -t 5
bind -n M-7 select-window -t 6
bind -n M-8 select-window -t 7
bind -n M-9 select-window -t 8

# Session switcher: plain Ctrl+f and prefix+f both open powertools
# (prefix+Ctrl+f keeps tmux's default find-window)
bind -n C-f display-popup -E -w 80% -h 80% "tmx switch"
bind f display-popup -E -w 80% -h 80% "tmx switch"
bind C-f command-prompt { find-window -Z "%%" }

# Project power tool (Ctrl+p to open project selector)
bind C-p display-popup -E -w 80% -h 80% "tmx"

# Cleanup sessions (Ctrl+k to kill unattached)
bind C-k run-shell "tmx cleanup"

# Kill the entire current session (prefix+X, confirm to avoid accidents)
bind X confirm-before -p "kill session '#S'? (y/n)" kill-session

# Agent dashboard (prefix+g = aGents). Shows each tmux pane's Claude/Codex
# status (working/ready/decision) read from ~/.claude/sessions/<pid>.json.
bind g display-popup -E -w 80% -h 80% "tmx agents"

# Jump to the most recent claude/codex attention session (queue populated by
# notify-attention.sh hooks). Lowercase a = quick-pop the newest; uppercase A
# = fzf picker over all pending entries (Enter jumps, Ctrl-D/Del removes).
bind a run-shell "$HOME/.claude/scripts/jump-attention.sh"
bind A display-popup -E -w 80% -h 80% "$HOME/.claude/scripts/attention-picker.sh"

# Plugins (managed by TPM)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Resurrect: capture visible pane contents (safer than save-shell-history)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# Manual on-demand save: prefix + Ctrl-s (resurrect default, made explicit).
# Restore is prefix + Ctrl-r.
set -g @resurrect-save 'C-s'

# Flash "󰆓 saved" in the status bar after every save — fires for both the
# manual prefix+Ctrl-s and continuum's quiet auto-saves (which are otherwise
# silent). The hook touches a marker that tmux-save-status.sh reads, then
# forces an immediate status redraw so the flash appears without waiting for
# the next status-interval. Single-quoted so tmux stores it literally; save.sh
# eval's it in bash, which then expands ${TMPDIR:-/tmp}.
set -g @resurrect-hook-post-save-all 'touch "${TMPDIR:-/tmp}/tmux-last-save"; tmux refresh-client -S'

# Continuum: auto-restore on tmux start (boot via systemd disabled — its
# ExecStop ordering destroyed saves on every shutdown, see tmux.service mask).
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Initialize TPM (must stay at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
