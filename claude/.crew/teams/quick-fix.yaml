name: quick-fix
description: "단순 버그 — 수정 → 테스트 (조사 없이 바로)"
roles:
    - fixer
    - tester

stages:
    - name: fix
      roles:
          - role: fixer
            worktree: true
            output: .crew/results/fixer/summary.md

    - name: test
      depends_on: fix
      roles:
          - role: tester
            output: .crew/results/tester/summary.md
