name: bugfix
description: "3명 독립 조사 → 종합 → 수정 → 테스트"
roles:
    - investigator
    - synthesizer
    - fixer
    - tester

stages:
    - name: investigate
      parallel: true
      roles:
          - role: investigator
            output: .crew/investigation-1.md
          - role: investigator
            output: .crew/investigation-2.md
          - role: investigator
            output: .crew/investigation-3.md

    - name: synthesize
      depends_on: investigate
      roles:
          - role: synthesizer
      output: .crew/synthesis.md
      approve: true

    - name: fix
      depends_on: synthesize
      roles:
          - role: fixer
            worktree: true
            input: .crew/synthesis.md
            output: .crew/results/fixer/summary.md

    - name: test
      depends_on: fix
      roles:
          - role: tester
            output: .crew/results/tester/summary.md
