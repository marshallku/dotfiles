general {
  # copad presence: flip to away the moment we enter the lock
  # screen — earlier than any idle threshold, so harness pings start
  # routing to Discord without waiting out the 300s timer.
  lock_cmd         = /home/marshall/.local/bin/coctl presence away ; pidof hyprlock || hyprlock
  before_sleep_cmd = loginctl lock-session
  after_sleep_cmd  = hyprctl dispatch dpms on
}

# copad presence — idle-driven away/active toggle for the harness
# Discord routing (see copad examples/presence/README.md). 300s ≈ 5
# minutes; tune to taste. Absolute coctl path because hypridle is
# spawned from Hyprland exec-once and may not inherit ~/.local/bin
# on PATH.
listener {
  timeout          = 300
  on-timeout       = /home/marshall/.local/bin/coctl presence away
  on-resume        = /home/marshall/.local/bin/coctl presence active
}

# Screen off
listener {
  timeout          = 1800
  on-timeout       = hyprctl dispatch dpms off
  on-resume        = hyprctl dispatch dpms on
}

# Lock
listener {
  timeout          = 2100
  on-timeout       = loginctl lock-session
}
