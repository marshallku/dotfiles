splash = false

# Active wallpaper is a stable symlink; swap it via:
#   ~/.config/hypr/scripts/wallpaper.sh <image|random|next|prev>
$wallpaper = /home/marshall/Pictures/Wallpapers/.current

wallpaper {
    monitor   = HDMI-A-1
    path      = $wallpaper
    fit_mode  = cover
}

wallpaper {
    monitor   = DP-1
    path      = $wallpaper
    fit_mode  = cover
}

wallpaper {
    monitor   = eDP-1
    path      = $wallpaper
    fit_mode  = cover
}
