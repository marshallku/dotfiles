general {
  hide_cursor          = true
  immediate_render     = true
}

background {
  monitor              =
  path                 = /home/marshall/Pictures/Wallpapers/wallpaper.jpg
  blur_passes          = 3
  blur_size            = 8
  contrast             = 0.85
  brightness           = 0.7
  vibrancy             = 0.15
  vibrancy_darkness    = 0.1
}

auth {
  pam:enabled          = true
  fingerprint:enabled  = false
}

# Large clock
label {
  monitor              =
  text                 = cmd[update:1000] echo "<span font_weight='bold'>$(date +'%H:%M')</span>"
  color                = rgba(205, 214, 244, 0.95)
  font_size            = 96
  font_family          = JetBrainsMono Nerd Font Mono Bold
  position             = 0, 200
  halign               = center
  valign               = center
  shadow_passes        = 2
  shadow_size          = 4
  shadow_color         = rgba(17, 17, 27, 0.6)
}

# Date and day of week
label {
  monitor              =
  text                 = cmd[update:60000] echo "$(date +'%A, %B %d')"
  color                = rgba(186, 194, 222, 0.9)
  font_size            = 22
  font_family          = JetBrainsMono Nerd Font Mono
  position             = 0, 120
  halign               = center
  valign               = center
  shadow_passes        = 1
  shadow_size          = 3
  shadow_color         = rgba(17, 17, 27, 0.4)
}

# Time-based greeting
label {
  monitor              =
  text                 = cmd[update:60000] HOUR=$(date +%H); if [ $HOUR -lt 6 ]; then echo "Good night, Marshall"; elif [ $HOUR -lt 12 ]; then echo "Good morning, Marshall"; elif [ $HOUR -lt 18 ]; then echo "Good afternoon, Marshall"; else echo "Good evening, Marshall"; fi
  color                = rgba(203, 166, 247, 0.8)
  font_size            = 16
  font_family          = JetBrainsMono Nerd Font Mono
  position             = 0, 70
  halign               = center
  valign               = center
}

# Password input
input-field {
  monitor              =
  size                 = 300, 50
  outline_thickness    = 2
  dots_size            = 0.25
  dots_spacing         = 0.3
  dots_center          = true
  outer_color          = rgba(203, 166, 247, 0.5)
  inner_color          = rgba(49, 50, 68, 0.8)
  font_color           = rgba(205, 214, 244, 1.0)
  fade_on_empty        = true
  placeholder_text     = <span foreground="##6c7086">Password...</span>
  hide_input           = false
  rounding             = 12
  check_color          = rgba(166, 227, 161, 0.8)
  fail_color           = rgba(243, 139, 168, 0.8)
  fail_text            = <span foreground="##f38ba8">Authentication failed</span>
  position             = 0, -20
  halign               = center
  valign               = center
  shadow_passes        = 2
  shadow_size          = 4
  shadow_color         = rgba(17, 17, 27, 0.4)
}
