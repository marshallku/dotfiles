# copad-native status bar modules — manifest-only plugin (no service
# binary). copadd resolves a module by plugin name and runs its `exec`
# via `sh -c` with cwd = this dir and COPAD_SOCKET / COPAD_PLUGIN_DIR in
# the env (copad-daemon/src/main.rs `run_plugin_shell`). stdout becomes
# the label: a `{"text":..,"tooltip":..}` JSON splits text/hover, any
# other output is shown verbatim. Empty stdout → empty label (the bar
# does NOT collapse empty modules, so idle modules `exit 0` to stay
# blank rather than printing a zero-state).
#
# DESIGN: this bar deliberately shows ONLY what copad's workflow runtime
# knows and no other bar can — pilot agent jobs, todo backlog, presence.
# Clock / CPU / disk / git / agent-counts were intentionally dropped:
# waybar, tmux (incl. ~/.claude/scripts/tmux-agent-status.sh), and the
# zsh prompt already cover those, so duplicating them here is noise.
#
# PATH gotcha: the daemon (systemd user service / desktop-entry launch)
# does not inherit ~/.local/bin, so scripts call coctl by absolute path
# ($HOME/.local/bin/coctl), same as the keybindings in config.toml.

[plugin]
name = "statusbar"
title = "Status Bar Modules"
version = "0.2.0"
description = "copad-native workflow modules for the bottom bar: pilot agent jobs, todo backlog, presence. Deliberately excludes clock/cpu/disk/git which waybar/tmux/zsh already show."

# ── pilot: in-flight agent queue jobs (+ ⏸ when one awaits a gate) ────
[[modules]]
name = "pilot"
exec = "bash scripts/pilot.sh"
interval = 5
position = "center"
order = 10

# ── todo: active (non-done) backlog count (+ ! when any blocked) ──────
[[modules]]
name = "todo"
exec = "bash scripts/todo.sh"
interval = 30
position = "center"
order = 20

# ── presence: away indicator (external notification sinks armed) ─────
[[modules]]
name = "presence"
exec = "bash scripts/presence.sh"
interval = 15
position = "right"
order = 10

# Auth-gated copad modules — wired but disabled until their plugin is
# signed in (otherwise they render a blank slot). Uncomment when ready.
#
#   calendar : next event       (needs COPAD_CALENDAR_CLIENT_ID/SECRET)
#   jira     : assigned tickets  (needs jira auth)
#   slack    : unread/mentions   (needs slack auth)
#
